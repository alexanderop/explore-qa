rc: .lefthookrc

pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{ts,js,json,jsonc}"
      run: bunx biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true
    typecheck:
      glob: "*.ts"
      run: bun run typecheck

pre-push:
  commands:
    test:
      run: bun test
